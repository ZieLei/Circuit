<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Color+Emoji&family=Noto+Emoji:wght@300..700&display=swap" rel="stylesheet">

<ion-content [fullscreen]="true">
  <div class="signup-container">
    <!-- Header -->
    <div class="signup-header">
      <div class="logo-small">
        <ion-icon name="hardware-chip-outline"></ion-icon>
      </div>
      <h1 class="signup-title">Create Account</h1>
      <p class="signup-subtitle">Join Circuit for the best PC parts</p>
    </div>

    <!-- Signup Form -->
    <div class="signup-form">
      <div class="input-group">
        <ion-icon name="mail-outline" class="input-icon"></ion-icon>
        <ion-input class="modern-input" type="email" placeholder="Email Address" fill="outline"></ion-input>
      </div>

      <div class="input-group">
        <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
        <ion-input class="modern-input" type="password" placeholder="Password" fill="outline"></ion-input>
      </div>

      <div class="input-group">
        <ion-icon name="shield-checkmark-outline" class="input-icon"></ion-icon>
        <ion-input class="modern-input" type="password" placeholder="Confirm Password" fill="outline"></ion-input>
      </div>

      <ion-button class="primary-signup-button" (click)="signup()">
        <ion-icon name="person-add-outline" slot="start"></ion-icon>
        Create Account
      </ion-button>
    </div>

    <!-- Divider -->
    <div class="divider">
      <div class="line"></div>
      <span>or sign up with</span>
      <div class="line"></div>
    </div>

    <!-- Social Signup -->
    <div class="social-signup">
      <button class="social-button google" (click)="signup()">
        <ion-icon name="logo-google"></ion-icon>
      </button>
      <button class="social-button apple" (click)="signup()">
        <ion-icon name="logo-apple"></ion-icon>
      </button>
      <button class="social-button facebook" (click)="signup()">
        <ion-icon name="logo-facebook"></ion-icon>
      </button>
    </div>

    <!-- Login Link -->
    <div class="login-link">
      <span>Already have an account?</span>
      <a (click)="goToLogin()">Sign In</a>
    </div>
  </div>
</ion-content>
