<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Color+Emoji&family=Noto+Emoji:wght@300..700&display=swap" rel="stylesheet">

<ion-content [fullscreen]="true">
  <div class="landing-container">
    <!-- Logo Section -->
    <div class="logo-section">
      <div class="logo-icon">
        <ion-icon name="hardware-chip-outline"></ion-icon>
      </div>
      <h1 class="app-title">Circuit</h1>
      <p class="app-tagline">Your Ultimate PC Parts Destination</p>
    </div>

    <!-- Feature Highlights -->
    <div class="features-section">
      <div class="feature-item">
        <ion-icon name="flash-outline"></ion-icon>
        <span>Latest Hardware</span>
      </div>
      <div class="feature-item">
        <ion-icon name="shield-checkmark-outline"></ion-icon>
        <span>Authentic Products</span>
      </div>
      <div class="feature-item">
        <ion-icon name="car-outline"></ion-icon>
        <span>Fast Shipping</span>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="action-section">
      <ion-button class="primary-button" (click)="goToSignup()">
        <ion-icon name="person-add-outline" slot="start"></ion-icon>
        Create Account
      </ion-button>
      <ion-button class="secondary-button" (click)="goToLogin()">
        <ion-icon name="log-in-outline" slot="start"></ion-icon>
        Sign In
      </ion-button>
    </div>

    <!-- Guest Option -->
    <p class="guest-text">
      <span (click)="goToLogin()">Continue as Guest</span>
    </p>
  </div>
</ion-content>
