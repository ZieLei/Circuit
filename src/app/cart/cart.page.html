<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Jua&family=Noto+Color+Emoji&family=Noto+Emoji:wght@300..700&display=swap" rel="stylesheet">


<ion-content [fullscreen]="true">

  <div class="header">
    <ion-label class="title">My Cart</ion-label>
  </div>

  <div class="cart-item" *ngFor="let product of test_product">
    <div class="item">
      <img [src]="product.image" class="product-image">

      <div class="item-info">
        <ion-label class="product-name">
          <span class="product-name-text">{{ product.name }}</span>
        </ion-label>
        <ion-label class="product-variety">Color: Black</ion-label>

        <div class="bottom-row">
          <ion-label class="product-price">{{ formatPrice(product.price) }}</ion-label>
          <div class="add-remove-button">
            <button class="add-button">+</button>
            <ion-label class="product-counter">{{ getSafeCount(product.count) }}</ion-label>
            <button class="remove-button">-</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</ion-content>
