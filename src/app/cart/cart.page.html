<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Jua&family=Noto+Color+Emoji&family=Noto+Emoji:wght@300..700&display=swap" rel="stylesheet">

<ion-content [fullscreen]="true">
  <div class="header">
    <ion-label class="title">My Cart</ion-label>
  </div>

  <!-- Empty cart state -->
  <div *ngIf="cartItems.length === 0" class="empty-cart">
    <ion-icon name="cart-outline" class="empty-cart-icon"></ion-icon>
    <ion-label class="empty-cart-text">Your cart is empty</ion-label>
    <ion-button class="shop-now-button" routerLink="/tabs/home">Shop Now</ion-button>
  </div>

  <!-- Cart items -->
  <div class="cart-items-container" *ngIf="cartItems.length > 0">
    <div class="cart-item" *ngFor="let item of cartItems">
      <div class="item" (click)="viewProduct(item.product)">
        <ion-img [src]="item.product.image || 'assets/images/placeholder.png'" class="product-image"></ion-img>

        <div class="item-info">
          <ion-label class="product-name">
            <span class="product-name-text">{{ item.product.name }}</span>
          </ion-label>
          <ion-label class="product-variety" *ngIf="item.selectedVariant">
            Color: {{ item.selectedVariant }}
          </ion-label>

          <div class="bottom-row">
            <ion-label class="product-price">{{ formatPrice(item.product.price) }}</ion-label>
            <div class="add-remove-button" (click)="$event.stopPropagation()">
              <button class="remove-button" (click)="updateQuantity(item, -1)">−</button>
              <ion-label class="product-counter">{{ item.quantity }}</ion-label>
              <button class="add-button" (click)="updateQuantity(item, 1)">+</button>
            </div>
          </div>
        </div>
      </div>

      <button class="delete-button" (click)="removeItem(item)">
        <ion-icon name="trash-outline"></ion-icon>
      </button>
    </div>
  </div>

  <!-- Bottom bar with total and checkout -->
  <div class="bottom-bar" *ngIf="cartItems.length > 0">
    <div class="total-section">
      <ion-label class="total-label">Total:</ion-label>
      <ion-label class="total-amount">{{ formatPrice(getCartTotal()) }}</ion-label>
    </div>
    <button class="checkout-button" (click)="checkout()">
      Checkout
    </button>
  </div>
</ion-content>
