<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Jua&family=Noto+Color+Emoji&family=Noto+Emoji:wght@300..700&display=swap" rel="stylesheet">

<ion-content [fullscreen]="true">
  <div class="header">
    <ion-label class="title">Wishlist</ion-label>
  </div>

  <!-- Empty wishlist state -->
  <div *ngIf="wishlistItems.length === 0" class="empty-wishlist">
    <ion-icon name="heart-outline" class="empty-wishlist-icon"></ion-icon>
    <ion-label class="empty-wishlist-text">Your wishlist is empty</ion-label>
    <ion-button class="shop-now-button" routerLink="/tabs/home">Start Shopping</ion-button>
  </div>

  <!-- Wishlist items -->
  <div class="wishlist-items-container" *ngIf="wishlistItems.length > 0">
    <div class="wishlist-item" *ngFor="let product of wishlistItems">
      <div class="item" (click)="viewProduct(product)">
        <ion-img class="product-image" [src]="product.image || 'assets/images/placeholder.png'"></ion-img>

        <div class="product-details">
          <div class="product-header">
            <ion-label>
              <span class="product-name">{{ product.name }}</span>
            </ion-label>
            <ion-label class="product-brand" *ngIf="product.brand">{{ product.brand }}</ion-label>
          </div>

          <div class="product-rating" *ngIf="product.rating">
            <ion-icon name="star" class="star-icon"></ion-icon>
            <span class="rating-value">{{ product.rating }}</span>
            <span class="rating-count">({{ formatNumber(product.reviews) }})</span>
          </div>

          <div class="price-and-buttons">
            <div class="price-section">
              <ion-label class="product-price">{{ formatPrice(product.price) }}</ion-label>
              <ion-label class="original-price" *ngIf="product.originalPrice && product.originalPrice > product.price">
                {{ formatPrice(product.originalPrice) }}
              </ion-label>
            </div>
            <div class="action-buttons">
              <button class="add-to-cart-btn" (click)="$event.stopPropagation(); addToCart(product)">
                <ion-icon name="cart-outline"></ion-icon>
              </button>
              <button class="delete-btn" (click)="$event.stopPropagation(); removeItem(product)">
                <ion-icon name="trash-outline"></ion-icon>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</ion-content>
