<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Color+Emoji&family=Noto+Emoji:wght@300..700&display=swap" rel="stylesheet">

<ion-content [fullscreen]="true">
  <div class="login-container">
    <!-- Header -->
    <div class="login-header">
      <div class="logo-small">
        <ion-icon name="hardware-chip-outline"></ion-icon>
      </div>
      <h1 class="login-title">Welcome Back</h1>
      <p class="login-subtitle">Sign in to continue shopping</p>
    </div>

    <!-- Login Form -->
    <div class="login-form">
      <div class="input-group">
        <ion-icon name="mail-outline" class="input-icon"></ion-icon>
        <ion-input class="modern-input" type="email" placeholder="Email Address" fill="outline"></ion-input>
      </div>

      <div class="input-group">
        <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
        <ion-input class="modern-input" type="password" placeholder="Password" fill="outline"></ion-input>
      </div>

      <div class="forgot-password-row">
        <span (click)="forgotPassword()">Forgot Password?</span>
      </div>

      <ion-button class="primary-login-button" (click)="login()">
        <ion-icon name="log-in-outline" slot="start"></ion-icon>
        Sign In
      </ion-button>
    </div>

    <!-- Divider -->
    <div class="divider">
      <div class="line"></div>
      <span>or continue with</span>
      <div class="line"></div>
    </div>

    <!-- Social Login -->
    <div class="social-login">
      <button class="social-button google" (click)="login()">
        <ion-icon name="logo-google"></ion-icon>
      </button>
      <button class="social-button apple" (click)="login()">
        <ion-icon name="logo-apple"></ion-icon>
      </button>
      <button class="social-button facebook" (click)="login()">
        <ion-icon name="logo-facebook"></ion-icon>
      </button>
    </div>

    <!-- Sign Up Link -->
    <div class="signup-link">
      <span>Don't have an account?</span>
      <a (click)="goToSignup()">Create Account</a>
    </div>
  </div>
</ion-content>
